name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Compile TypeScript
      run: npm run compile

    - name: Lint
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit

    - name: Download CLI binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: pwsh -NoProfile -File scripts/download-cli.ps1

    - name: Package VSIX
      run: |
        New-Item -ItemType Directory -Path artifacts -Force | Out-Null
        npx vsce package --no-dependencies -o artifacts/winapp-dev.vsix

    - name: Upload VSIX artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: vscode-extension
        path: artifacts/*.vsix
        if-no-files-found: error
