trigger:
  batch: true
  branches:
    include:
      - vsc-rel/v*
pr: none

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

parameters:
  - name: CliReleaseTag
    displayName: CLI release tag to bundle in VS Code extension (empty = latest stable)
    type: string
    default: ''
  - name: SkipPublish
    displayName: Skip publishing to VS Code Marketplace
    type: boolean
    default: false
  - name: DoEsrp
    displayName: Sign the VSIX package (DoEsrp)
    type: boolean
    default: true

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    settings:
      networkIsolationPolicy: Permissive, CfsClean
    sdl:
      policheck:
        enabled: true
        break: true
        severity: 'Warning'
      sourceAnalysisPool:
        name: Azure-Pipelines-1ESPT-ExDShared
        image: windows-latest
        os: windows
    stages:
    - stage: Build
      variables:
      - group: signingIdentity
      jobs:
      - job: Build
        pool:
          name: Azure-Pipelines-1ESPT-ExDShared
          image: windows-latest
          os: windows
          hostArchitecture: amd64
        steps:
          - pwsh: |
              Write-Host "=== Pre-checkout network diagnostic ==="
              Write-Host "--- DNS: github.com ---"
              try { Resolve-DnsName github.com -Type A -ErrorAction Stop | Format-Table Name,IPAddress,Type -AutoSize | Out-String | Write-Host } catch { Write-Host "Resolve-DnsName failed: $($_.Exception.Message)" }
              Write-Host "--- DNS: codeload.github.com ---"
              try { Resolve-DnsName codeload.github.com -Type A -ErrorAction Stop | Format-Table Name,IPAddress,Type -AutoSize | Out-String | Write-Host } catch { Write-Host "Resolve-DnsName failed: $($_.Exception.Message)" }
              Write-Host "--- TCP 443 to github.com ---"
              Test-NetConnection github.com -Port 443 -WarningAction SilentlyContinue | Format-List ComputerName,RemoteAddress,RemotePort,TcpTestSucceeded | Out-String | Write-Host
              Write-Host "--- curl -v https://github.com (max 20s) ---"
              curl.exe -sv -o NUL --max-time 20 https://github.com 2>&1 | Write-Host
              Write-Host "--- HTTP(S) proxy env ---"
              "HTTP_PROXY=$env:HTTP_PROXY"; "HTTPS_PROXY=$env:HTTPS_PROXY"; "NO_PROXY=$env:NO_PROXY"
              Write-Host "=== EXPERIMENT: is the block repo-specific or all of github.com? ==="
              Write-Host "--- Control: non-GitHub egress (dev.azure.com:443) ---"
              Test-NetConnection dev.azure.com -Port 443 -WarningAction SilentlyContinue | Format-List ComputerName,RemoteAddress,TcpTestSucceeded | Out-String | Write-Host
              Write-Host "--- clone a DIFFERENT github repo: microsoft/winappcli (public, no auth) ---"
              git clone --depth 1 https://github.com/microsoft/winappcli.git "$env:AGENT_TEMPDIRECTORY/winappcli-conntest" 2>&1 | Write-Host
              Write-Host "winappcli clone exit code: $LASTEXITCODE"
              Write-Host "--- ls-remote self repo: microsoft/WinAppVSCE ---"
              git ls-remote https://github.com/microsoft/WinAppVSCE.git HEAD 2>&1 | Write-Host
              Write-Host "WinAppVSCE ls-remote exit code: $LASTEXITCODE"
            displayName: 'Diagnose github.com connectivity (pre-checkout)'
            continueOnError: true
          - checkout: self
          - task: UseNode@1
            displayName: Setup Node.js 24
            inputs:
              version: '24.x'
          - ${{ if eq(parameters.DoEsrp, 'true') }}:
            - task: UseDotNet@2
              displayName: Setup .NET 8.0 (For ESRP Task)
              inputs:
                packageType: runtime
                version: 8.0.x
          - task: PowerShell@2
            displayName: Download public CLI release for VS Code extension
            env:
              GH_TOKEN: $(GITHUB_TOKEN)
            inputs:
              pwsh: true
              errorActionPreference: 'stop'
              targetType: 'inline'
              script: |
                $cliReleaseTag = "${{ parameters.CliReleaseTag }}"
                $repo = "microsoft/winappcli"

                if ([string]::IsNullOrWhiteSpace($cliReleaseTag)) {
                    Write-Host "No CLI release tag specified, finding latest stable release..."
                    $releases = gh release list --repo $repo --limit 10 --json tagName,isPrerelease,isDraft | ConvertFrom-Json
                    $stableRelease = $releases | Where-Object { -not $_.isPrerelease -and -not $_.isDraft } | Select-Object -First 1
                    if (-not $stableRelease) {
                        Write-Error "No stable release found for $repo"
                        exit 1
                    }
                    $cliReleaseTag = $stableRelease.tagName
                    Write-Host "Found latest stable release: $cliReleaseTag"
                } else {
                    Write-Host "Using specified CLI release tag: $cliReleaseTag"
                }

                Write-Host "##vso[task.setvariable variable=CliReleaseTag]$cliReleaseTag"

                # Download x64 and arm64 CLI zips using gh CLI
                $cliDir = "$(System.DefaultWorkingDirectory)/artifacts/public-cli"

                New-Item -ItemType Directory -Path "$cliDir/win-x64" -Force | Out-Null
                New-Item -ItemType Directory -Path "$cliDir/win-arm64" -Force | Out-Null

                Write-Host "Downloading CLI binaries from release $cliReleaseTag..."
                gh release download $cliReleaseTag --repo $repo --pattern "winappcli-x64.zip" --dir $cliDir
                if ($LASTEXITCODE -ne 0) {
                    Write-Error "Failed to download winappcli-x64.zip from release $cliReleaseTag"
                    exit 1
                }

                gh release download $cliReleaseTag --repo $repo --pattern "winappcli-arm64.zip" --dir $cliDir
                if ($LASTEXITCODE -ne 0) {
                    Write-Error "Failed to download winappcli-arm64.zip from release $cliReleaseTag"
                    exit 1
                }

                # Extract
                Expand-Archive -Path "$cliDir/winappcli-x64.zip" -DestinationPath "$cliDir/win-x64" -Force
                Expand-Archive -Path "$cliDir/winappcli-arm64.zip" -DestinationPath "$cliDir/win-arm64" -Force

                # Validate
                if (-not (Test-Path "$cliDir/win-x64/winapp.exe")) {
                    Write-Error "winapp.exe not found in extracted x64 archive"
                    exit 1
                }
                if (-not (Test-Path "$cliDir/win-arm64/winapp.exe")) {
                    Write-Error "winapp.exe not found in extracted arm64 archive"
                    exit 1
                }

                Write-Host "CLI binaries ($cliReleaseTag) downloaded and validated successfully"
          - task: PowerShell@2
            displayName: Create temporary .npmrc for Build
            inputs:
              targetType: inline
              pwsh: true
              script: |
                $npmrcContent = "registry=https://pkgs.dev.azure.com/microsoft/pde-oss/_packaging/winapp-npm-feed/npm/registry/`nalways-auth=true"
                Set-Content -Path "$(System.DefaultWorkingDirectory)/.npmrc" -Value $npmrcContent
                Write-Host "Created .npmrc for Azure Artifacts feed"
          - task: npmAuthenticate@0
            displayName: Authenticate with Azure Artifacts feed
            inputs:
              workingFile: '$(System.DefaultWorkingDirectory)/.npmrc'
          - task: PowerShell@2
            displayName: Package VS Code extension with public CLI
            inputs:
              pwsh: true
              filePath: $(System.DefaultWorkingDirectory)\scripts\package-vsc.ps1
              arguments: "-Stable -CliBinariesPath '$(System.DefaultWorkingDirectory)/artifacts/public-cli'"
          - ${{ if eq(parameters.DoEsrp, 'true') }}:
            - task: EsrpCodeSigning@6
              displayName: Code Sign ESRP - VSIX Package
              inputs:
                ConnectedServiceName: $(SigningServiceName)
                AppRegistrationClientId: $(SigningAppId)
                AppRegistrationTenantId: $(SigningTenantId)
                AuthAKVName: $(SigningAKVName)
                AuthCertName: $(SigningAuthCertName)
                AuthSignCertName: $(SigningSignCertName)
                FolderPath: '$(System.DefaultWorkingDirectory)/artifacts/'
                Pattern: '*.vsix'
                UseMinimatch: true
                signConfigType: inlineSignParams
                inlineOperation: |
                  [
                      {
                          "KeyCode": "CP-401405",
                          "OperationCode": "OpcSign",
                          "Parameters": {
                              "FileDigest": "/fd SHA256"
                          },
                          "ToolName": "sign",
                          "ToolVersion": "1.0"
                      },
                      {
                          "KeyCode": "CP-401405",
                          "OperationCode": "OpcVerify",
                          "Parameters": {},
                          "ToolName": "sign",
                          "ToolVersion": "1.0"
                      }
                  ]
          - task: PowerShell@2
            displayName: Generate extension manifest for publisher signing
            inputs:
              pwsh: true
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              script: |
                $artifactsDir = "$(System.DefaultWorkingDirectory)/artifacts"
                $vsix = Get-ChildItem -Path $artifactsDir -Filter "winapp-*.vsix" |
                    Sort-Object LastWriteTime -Descending | Select-Object -First 1
                if (-not $vsix) {
                    Write-Error "No VSIX found in $artifactsDir"
                    exit 1
                }
                Write-Host "Generating publisher manifest for $($vsix.Name)"
                # Uses the @vscode/vsce devDependency installed by package-vsc.ps1 (offline, no public registry)
                npx vsce generate-manifest -i "$($vsix.FullName)" -o "$artifactsDir/extension.manifest"
                if ($LASTEXITCODE -ne 0) {
                    Write-Error "vsce generate-manifest failed"
                    exit 1
                }
                # ESRP signs this file in place to produce the publisher signature
                Copy-Item "$artifactsDir/extension.manifest" "$artifactsDir/extension.signature.p7s" -Force
                Write-Host "Created extension.manifest and extension.signature.p7s"
          - ${{ if eq(parameters.DoEsrp, 'true') }}:
            - task: EsrpCodeSigning@6
              displayName: Code Sign ESRP - VS Code Publisher Signature
              inputs:
                ConnectedServiceName: $(SigningServiceName)
                AppRegistrationClientId: $(SigningAppId)
                AppRegistrationTenantId: $(SigningTenantId)
                AuthAKVName: $(SigningAKVName)
                AuthCertName: $(SigningAuthCertName)
                AuthSignCertName: $(SigningSignCertName)
                FolderPath: '$(System.DefaultWorkingDirectory)/artifacts/'
                Pattern: 'extension.signature.p7s'
                UseMinimatch: true
                signConfigType: inlineSignParams
                inlineOperation: |
                  [
                      {
                          "KeyCode": "CP-401405",
                          "OperationCode": "VSCodePublisherSign",
                          "Parameters": {},
                          "ToolName": "sign",
                          "ToolVersion": "1.0"
                      }
                  ]
          - task: CopyFiles@2
            displayName: Copy Artifacts - VS Code Extension
            inputs:
              sourceFolder: '$(System.DefaultWorkingDirectory)/artifacts/'
              contents: |
                *.vsix
                extension.manifest
                extension.signature.p7s
              targetFolder: '$(Build.ArtifactStagingDirectory)/vscode-extension'
          - task: 1ES.PublishPipelineArtifact@1
            displayName: Upload Artifact - VS Code Extension
            inputs:
              path: '$(Build.ArtifactStagingDirectory)/vscode-extension'
              artifactName: vscode-extension

    - stage: Release_VSC
      displayName: Publish VS Code Extension
      dependsOn: Build
      condition: and(succeeded(), eq('${{ parameters.SkipPublish }}', 'false'))
      variables:
      - group: signingIdentity
      jobs:
      - job: publish_vsc_extension
        pool:
          name: Azure-Pipelines-1ESPT-ExDShared
          image: windows-latest
          os: windows
          hostArchitecture: amd64
        displayName: VS Code Marketplace
        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            artifactName: vscode-extension
            targetPath: $(Pipeline.Workspace)/vscode-extension
        steps:
          - task: UseNode@1
            displayName: Setup Node.js 24
            inputs:
              version: '24.x'
          - task: PowerShell@2
            displayName: Create temporary .npmrc
            inputs:
              targetType: inline
              script: |
                $npmrcContent = "registry=https://pkgs.dev.azure.com/microsoft/pde-oss/_packaging/winapp-npm-feed/npm/registry/`nalways-auth=true"
                Set-Content -Path ".npmrc" -Value $npmrcContent
                Write-Host "Created .npmrc for Azure Artifacts feed"
          - task: npmAuthenticate@0
            displayName: Authenticate with Azure Artifacts feed
            inputs:
              workingFile: '.npmrc'
          - task: AzureCLI@2
            displayName: Publish to VS Code Marketplace
            inputs:
              azureSubscription: $(SigningServiceName)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Install vsce from the authenticated Azure Artifacts feed.
                # The 1ES pool blocks public npmjs egress, so a plain global install
                # falls back to the public registry and fails with EACCES. Pin the
                # registry to the private feed and point npm at the authenticated
                # .npmrc so vsce + its transitive deps resolve through the proxy.
                npm install -g @vscode/vsce@3 \
                  --registry=https://pkgs.dev.azure.com/microsoft/pde-oss/_packaging/winapp-npm-feed/npm/registry/ \
                  --userconfig "$(System.DefaultWorkingDirectory)/.npmrc"

                VSIX=$(find "$(Pipeline.Workspace)/vscode-extension/" -name "*.vsix" | head -1)
                MANIFEST=$(find "$(Pipeline.Workspace)/vscode-extension/" -name "extension.manifest" | head -1)
                SIGNATURE=$(find "$(Pipeline.Workspace)/vscode-extension/" -name "extension.signature.p7s" | head -1)
                if [ -z "$VSIX" ]; then
                  echo "##[error]No VSIX file found in vscode-extension artifact"
                  exit 1
                fi
                if [ -z "$MANIFEST" ] || [ -z "$SIGNATURE" ]; then
                  echo "##[error]No publisher manifest/signature found in vscode-extension artifact"
                  exit 1
                fi

                echo "Publishing $VSIX to VS Code Marketplace with publisher signature..."

                # Diagnostic: print the Marketplace identity this job authenticates as.
                # Per VS Code docs, the 'id' below must be added as a Contributor member
                # of the publisher (Marketplace > Manage Publishers > Microsoft-WinAppCLI).
                # If publishing fails with "log in with Microsoft corporate credentials",
                # this id does NOT match an authorized publisher member.
                echo "##[group]Marketplace identity (must be a Contributor on the publisher)"
                az rest -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
                  --resource 499b84ac-1321-427f-aa17-267ca6975798 || \
                  echo "##[warning]Could not resolve profiles/me (token/identity issue)"
                echo "##[endgroup]"

                vsce publish --packagePath "$VSIX" --manifestPath "$MANIFEST" --signaturePath "$SIGNATURE" --azure-credential

